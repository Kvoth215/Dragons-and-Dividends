<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Quest — Personal Finance Simulation</title>
<meta name="description" content="A cross-curricular D&D-influenced personal finance simulation for middle school students. Aligned to PA Academic Standards for Personal Finance 17.1–17.6.">
<style>
:root{--gold:#BA7517;--gold-lt:#FAEEDA;--green:#3B6D11;--red:#A32D2D;--purple:#7B2FBE;--text:#412402;--muted:#854F0B;--serif:'Georgia',serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5efe0;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:12px 8px;}
#app{width:100%;max-width:600px;}
.card{background:var(--gold-lt);border:2px solid var(--gold);border-radius:8px;padding:20px 22px;margin:6px 0;position:relative;}
.card::after{content:'';position:absolute;inset:5px;border:1px solid rgba(239,159,39,.2);border-radius:4px;pointer-events:none;}
.card.y2{background:#f0e6ff;border-color:var(--purple);}
h1.gt{font-family:var(--serif);font-size:26px;text-align:center;color:var(--text);letter-spacing:3px;margin:0 0 2px;}
h2.st{font-family:var(--serif);font-size:17px;text-align:center;color:#633806;margin:0 0 2px;}
.ey{font-size:11px;letter-spacing:2px;color:var(--muted);text-align:center;display:block;margin-bottom:12px;font-weight:bold;}
.btn{font-size:13px;font-weight:bold;padding:10px 18px;border:none;border-radius:4px;cursor:pointer;font-family:inherit;}
.bg{background:var(--gold);color:var(--gold-lt);}.bgn{background:var(--green);color:#eaf3de;}.br{background:var(--red);color:#fcebeb;}.bo{background:transparent;border:1.5px solid var(--gold);color:#633806;}.bpu{background:var(--purple);color:#f0e6ff;}
.btn:hover{opacity:.85;}.btn:disabled{opacity:.45;cursor:not-allowed;}
.bw{width:100%;display:block;padding:12px;font-size:14px;margin:4px 0;}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.sc{background:rgba(255,255,255,.5);border:1px solid rgba(186,117,23,.33);border-radius:5px;padding:8px 10px;text-align:center;}
.sl{font-size:11px;color:var(--muted);margin:0;}.sv{font-family:var(--serif);font-size:14px;font-weight:bold;margin:3px 0 0;}
.er{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid rgba(186,117,23,.2);font-size:13px;}.er:last-child{border-bottom:none;}
.box{background:rgba(255,255,255,.35);border:1px solid rgba(186,117,23,.4);border-radius:5px;padding:10px 13px;font-size:13px;line-height:1.6;}
.gd{background:rgba(234,243,222,.5);border-color:var(--green);color:#173404;}.bd{background:rgba(252,235,235,.5);border-color:var(--red);color:#501313;}.nf{background:var(--gold-lt);border-color:var(--gold);color:var(--text);}.pu{background:#f0e6ff;border-color:var(--purple);color:#1a0040;}
.sep{border:none;border-top:1px solid rgba(186,117,23,.3);margin:12px 0;}
.pc{border:2px solid rgba(186,117,23,.4);border-radius:6px;padding:11px 13px;margin-bottom:8px;cursor:pointer;background:rgba(255,255,255,.25);}
.pc.sel{border-color:var(--gold);background:rgba(250,199,117,.2);}
.pt{font-family:var(--serif);font-size:14px;color:var(--text);font-weight:bold;margin:0 0 1px;}
.pf{font-size:11px;color:var(--muted);font-style:italic;margin:0 0 4px;}
.tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;font-weight:bold;margin:2px 2px;}
.ta{background:rgba(250,199,117,.2);border:1px solid var(--gold);color:#633806;}.tg{background:rgba(192,221,151,.2);border:1px solid var(--green);color:#173404;}
.tr{background:rgba(247,193,193,.2);border:1px solid var(--red);color:#501313;}.tb{background:rgba(181,212,244,.2);border:1px solid #185fa5;color:#042c53;}.tpu{background:rgba(232,212,244,.2);border:1px solid var(--purple);color:#3b0d6a;}
.fi{background:rgba(255,255,255,.7);border:1.5px solid var(--gold);border-radius:4px;padding:8px 11px;color:var(--text);font-size:14px;width:100%;font-family:inherit;}
textarea.fi{min-height:120px;resize:vertical;line-height:1.5;}
input[type=range]{accent-color:var(--gold);width:100%;margin:4px 0;}
.rw{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.anim{animation:bob 1.6s ease-in-out infinite;display:inline-block;}
.puls{animation:pulse .85s ease-in-out infinite;display:inline-block;}
.save-note{font-size:11px;color:var(--gold);text-align:right;margin:5px 0 0;}
footer{text-align:center;font-size:11px;color:var(--muted);margin:16px 0 8px;line-height:1.6;}
footer a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>

  {e:'🦷',t:'Molar Catastrophe!',d:"Your tooth, unprompted and unannounced, has decided to become a problem. Healer fees: immediate, non-negotiable.",g:-350,typ:'bad',tip:'Medical bills arrive without warning. Emergency funds are your first line of dental defense! (PA 17.5.3-5.B)'},

  {e:'🌾',t:'Record Harvest!',d:"Exceptional growing conditions drove provision prices down this month. Your grocery bill thanked you.",g:120,typ:'good',tip:'Seasonal savings are real. Buy ahead when prices dip on non-perishables. (PA 17.3.9-12.B)'}

const EV2=[
  {e:'📉',t:'The Market Took a Tumble',d:"Investment markets dropped 15% overnight. The financial scribes call it 'a correction.' Your savings account has other words for it.",g:-1,typ:'bad',pct:0.15,savings:true,tip:'Market volatility is the price of higher returns. Long-term investors stay the course. (PA 17.4.6-8.J)'},

  {e:'🦠',t:'The Second Plague Season',d:"Medical expenses mounted. Your insurance covered some of it. 'Some' is doing a lot of work there.",g:-600,typ:'bad',tip:'Health insurance out-of-pocket maximums protect you from catastrophic costs. (PA 17.5.6-8.C)'},
  {e:'📈',t:'Dividend Day!',d:"Your investments paid dividends. Passive income: arrives while you were doing literally anything else.",g:350,typ:'good',tip:'Dividends are passive income. Reinvest them to accelerate compound growth. (PA 17.4.6-8.G)'},
  {e:'🏠',t:"Landlord's Annual Surprise",d:"Your landlord discovered he could charge more rent, and has decided to. The notice was polite. The increase was not.",g:-200,typ:'bad',tip:"Rent increases are predictable. Budget for 3–5% annual increases or research homeownership. (PA 17.3.9-12.J)"},
  {e:'💸',t:'The Crown Returns Overpaid Tax',d:"You overpaid the King's Tax last year. Bureaucracy moves slowly, but your refund has arrived.",g:480,typ:'good',tip:'Tax refunds mean you gave the Crown an interest-free loan all year. Adjust withholding. (PA 17.2.9-12.H)'},

const Q1=[
  {id:1,tm:0,sub:'🔢 Math',code:'PA 17.4.6-8.C',qt:"The Merchant's Vault",rt:'Compound Interest & Savings Accounts',lore:"The Grand Merchant's Guild requires proof of numerical competence before opening your Vault. Their motto: 'In Interest We Trust.' Their application process is, unfortunately, math-heavy.",q:"You deposit 500 gold coins in the Merchant's Vault at 4% annual interest.\n\nHow many gold coins will you have after 2 years?\n(Round to the nearest whole coin.)",hint:'Formula: Amount = Principal × (1 + rate)^years\n→ 500 × (1.04)² = 500 × 1.0816 = ?',type:'number',ans:541,tol:2,exp:"Year 1: 500 × 1.04 = 520gp\nYear 2: 520 × 1.04 = 540.8 ≈ 541gp\n\nYou earn interest ON your interest — that's compound interest.\nIt starts small. Then it becomes very interesting. (Pun fully intended.)",gr:0,lvl:2,msg:"The Merchant's Vault is now open! You may deposit savings each month."},
  {id:2,tm:1,sub:'📜 ELA',code:'PA 17.3.9-12.E',qt:'The Budget Proclamation',rt:'Financial Planning & Written Communication',lore:"The Royal Herald requires an Annual Budget Proclamation from all citizens. This is exactly like a personal budget — with more wax seals. The Herald notes that 'vibes' is not a valid budget category.",q:"Write a brief budget plan (4–6 sentences) that includes:\n\n1. Your main source of income\n2. Your two biggest expenses\n3. How much you plan to save and WHY\n4. One specific financial goal for the next 3 months",type:'writing',mw:30,checks:['I stated my specific income source','I identified my two biggest expenses by name','I stated my savings amount AND explained why','I described a specific, numbered 3-month goal'],gr:75,lvl:2,msg:"+75gp Herald's Stipend! Scroll stamped for teacher review."},
  {id:3,tm:2,sub:'🗺️ Social Studies',code:'PA 17.1.6-8.B',qt:'The Scarcity Scroll',rt:'Resource Scarcity & Opportunity Cost',lore:"A drought struck the realm! Provision prices rose 20%. The Royal Advisor needs a solution — and no, 'eat less' is not accepted economic policy. (It was proposed. It was vetoed. Three people resigned.)",q:"Monthly income: 3,000gp\nExpenses: Lodgings 900 + Provisions 700 + Transport 250 + Tax 650 = 2,500gp\nSavings goal: 500gp/month\n\nProvisions now cost 20% MORE.\n\nBy how many gold pieces must other expenses be reduced to still save 500gp?",hint:"Step 1: New provisions = 700 × 1.20\nStep 2: New total = old total + increase\nStep 3: Max spending = income − savings goal\nStep 4: Must cut = new total − max spending",type:'number',ans:140,tol:5,exp:"New provisions: 700 × 1.20 = 840gp (+140gp)\nNew total: 2,640gp\nMax spending: 3,000 − 500 = 2,500gp\nMust cut: 140gp\n\nThat 140gp is the opportunity cost of the drought.\n('Opportunity cost' = the polite academic term for 'something has to give.')",gr:100,lvl:3,msg:'+100gp Royal Advisor Stipend! The Crown expresses relief.'},
  {id:4,tm:3,sub:'⚗️ Science',code:'PA 17.3.9-12.K',qt:'The Candle Conspiracy',rt:'Unit Rate & Break-Even Analysis',lore:"The Royal Artificer offers a Crystal Lamp that eliminates candle costs forever. The Candle Guild is furious. You should do the math first, then ignore the parchment.",q:"Option A — Candles:\n  Cost: 2gp each, lasts 4 hours\n  You use: 4 hours of light per day\n\nOption B — Crystal Lamp:\n  Upfront cost: 80gp, ongoing daily cost: 0gp\n\nAfter how many DAYS will total costs be equal?",hint:"Candles: 4hrs ÷ 4hrs/candle = 1 candle/day → 2gp/day\nLamp stays fixed at 80gp\nBreak-even: 80 ÷ 2 = ? days",type:'number',ans:40,tol:2,exp:"Candle cost: 1/day × 2gp = 2gp/day\nDay 40: Candles = 80gp. Lamp = 80gp. Equal!\n\nAfter day 40, every day saves 2gp — forever.\nThe Candle Guild's objections become irrelevant on day 41.",gr:90,lvl:3,msg:'+90gp Artificer Research Credit! The Candle Guild protest has been filed and noted.'},
  {id:5,tm:4,sub:'🔢 Math',code:'PA 17.3.6-8.B',qt:'The Discount Dungeon',rt:'Discounts, Sales Tax & Order of Operations',lore:"The Grand Market has a 25% discount on armor, followed by 8% sales tax. The merchant calls this a 'great deal.' You call it math. Both descriptions are technically accurate.",q:"Armor normally costs 800gp.\n\nStep 1: A 25% discount is applied.\nStep 2: An 8% sales tax is added to the discounted price.\n\nWhat is the FINAL price you pay?",hint:"Step 1: Discount = 800 × 0.25. Discounted price = 800 − discount.\nStep 2: Tax = discounted price × 0.08. Final = discounted + tax.",type:'number',ans:648,tol:3,exp:"Discount: 800 × 0.25 = 200gp off → 600gp\nTax: 600 × 0.08 = 48gp\nFinal: 600 + 48 = 648gp\n\nKey: apply discount BEFORE tax. Order matters.",gr:80,lvl:3,msg:'+80gp Savvy Shopper Certification! The merchant notes your arithmetic with mild concern.'},
  {id:6,tm:5,sub:'⚗️ Science',code:'PA 17.3.9-12.K',qt:"The Artificer's Dilemma",rt:'Total Cost of Ownership',lore:"The Royal Artificer invented the Steam Cart. Shiny, impressive, and emits a concerning amount of steam. Which transportation costs LESS over 3 years? You have been volunteered to find out.",q:"🐴 Horse:\n  Feed: 30gp/month + Vet care: 200gp/year\n\n⚙️ Steam Cart:\n  Fuel: 50gp/month + Maintenance: 100gp/year\n\nWhich costs LESS over 3 years, and by how many gold pieces?",hint:"For each: (monthly × 36) + (annual × 3)\nSubtract to find the difference.",type:'nc',choices:[{id:'horse',label:'🐴 Horse is cheaper'},{id:'cart',label:'⚙️ Steam Cart is cheaper'}],ans:420,cc:'horse',tol:5,exp:"Horse: (30×36)+(200×3) = 1,080+600 = 1,680gp\nSteam Cart: (50×36)+(100×3) = 1,800+300 = 2,100gp\n\nHorse wins by 420gp. (Also quieter.)\nTotal Cost of Ownership: always calculate the REAL cost.",gr:150,lvl:4,msg:"+150gp Artificer's Grant! Steam Cart engineers are processing this stoically."},
  {id:7,tm:6,sub:'📜 ELA',code:'PA 17.6.6-8.G',qt:'The Complaint Scroll',rt:'Consumer Rights & Persuasive Writing',lore:"You purchased a 'Legendary Sword.' It was a stick with a ribbon. A very nice ribbon, but a stick. The Merchant's Guild has a complaint process. Time to use it — and your words.",q:"Write a formal complaint to the Merchant's Guild (4–6 sentences):\n\n1. What you purchased and what was promised\n2. What you actually received\n3. The specific resolution you are requesting\n4. Why consumer protection matters for everyone",type:'writing',mw:35,checks:["I named the product and described what was specifically promised","I explained what was actually received and the gap from the promise","I stated a specific resolution (refund amount, replacement, etc.)","I connected this to why consumer rights benefit everyone"],gr:90,lvl:4,msg:'+90gp Consumer Advocacy Award! The stick-sword merchant has been formally cited.'},
  {id:8,tm:7,sub:'🔢 Math',code:'PA 17.6.6-8.E',qt:"The Moneylender's Maze",rt:'Total Cost of Credit & Loan Comparison',lore:"You need 600gp urgently. Two moneylenders made offers. One is clearly better. Determining which requires math — which is precisely why lenders make the terms confusing.",q:"Moneylender A — Friendly Felgar:\n  600gp at 5%/month for 6 months, 115gp/mo payment\n\nMoneylender B — Reasonable Roderick:\n  600gp + one-time 10% fee, full repayment 660gp\n\nHow much MORE does Felgar's loan cost than Roderick's?",hint:"Felgar total = 115 × 6\nRoderick total = 600 + (600 × 0.10)\nDifference = Felgar − Roderick",type:'number',ans:30,tol:3,exp:"Friendly Felgar: 115 × 6 = 690gp\nReasonable Roderick: 600 + 60 = 660gp\nDifference: 30gp more for Felgar.\n\n5%/month = 60% annual rate. Predatory lending territory.\nRoderick is the lesser of two expensive evils.",gr:110,lvl:4,msg:"+110gp Debt Literacy Diploma! Felgar is disappointed. Roderick sends his regards."},
  {id:9,tm:8,sub:'🗺️ Social Studies',code:'PA 17.3.9-12.L',qt:"The King's Ledger",rt:'Taxes, Public Goods & Government Spending',lore:"The King published the Royal Budget. 'Roads and stuff' is insufficient at budget hearings. You have been summoned to do the actual math.",q:"The kingdom collects 10,000gp in taxes.\n\nBudget allocations:\n  Roads & Bridges: 25%\n  Healing Halls: 30%\n  Royal Guard: 20%\n  Schools of Learning: 15%\n  Remaining: ???%\n\nHow many gold pieces go to Schools of Learning?\nBonus: What % is 'Remaining'?",hint:"Schools: 10,000 × 0.15 = ?\nRemaining: add all %, subtract from 100",type:'number',ans:1500,tol:50,exp:"Schools: 10,000 × 0.15 = 1,500gp\nRemaining: 100−25−30−20−15 = 10% → 1,000gp (Royal Reserve)\n\nPublic goods are funded collectively — everyone uses them, everyone contributes.",gr:120,lvl:5,msg:"+120gp Royal Budget Analyst Seal! The Schools of Learning thank you personally."},
  {id:10,tm:9,sub:'⚗️ Science',code:'PA 17.3.9-12.K',qt:'The Sunstone Summit',rt:'Renewable Energy & Break-Even Analysis',lore:"The Realm debates Coalstone vs. Sunstone solar heating. The math will settle this without anyone's feelings.",q:"Option A — Coalstone:\n  Monthly cost: 80gp (ongoing)\n  Setup cost: 0gp\n\nOption B — Sunstone Solar:\n  Monthly cost: 20gp\n  One-time setup: 1,200gp\n\nAfter how many MONTHS are total costs equal?",hint:"Monthly savings: 80 − 20 = 60gp\nBreak-even = setup cost ÷ monthly savings",type:'number',ans:20,tol:1,exp:"Monthly savings: 80−20 = 60gp\nBreak-even: 1,200 ÷ 60 = 20 months\n\nAfter month 20, Sunstone saves 60gp every month forever.\nOver 10 years: 6,000gp saved on a 1,200gp investment.\n(The Coalstone Guild has left the chat.)",gr:130,lvl:5,msg:'+130gp Sunstone Summit Prize! The Coalstone Guild departed in silence.'},
  {id:11,tm:10,sub:'📜 ELA',code:'PA 17.1.9-12.A',qt:'The Final Chronicle',rt:'Financial Reflection & Goal Setting',lore:"You have survived nearly a full year of adulting. The Royal Chronicler requires a written account — not just what happened, but what you actually learned.",q:"Write your Financial Chronicle (5–7 sentences):\n\n1. Your best financial decision this year\n2. A challenge or surprise that affected your budget\n3. One thing you would do differently\n4. A specific financial goal for next year (include a number!)",type:'writing',mw:40,checks:['I described my best financial decision AND explained why it worked','I described a challenge/surprise with its specific budget impact','I stated something I would do differently and clearly explained why','I set a specific, numbered financial goal for next year'],gr:150,lvl:6,msg:"+150gp Chronicler's Quill Award! Your story is preserved for posterity (and your teacher)."}
];
const Q2=[
  {id:12,tm:12,sub:'🔢 Math',code:'PA 17.6.9-12.E',qt:'The Debt Dragon',rt:'Minimum Payments & Total Cost of Credit',lore:"You borrowed 5,000gp at 18% annual interest. You are only paying the minimum. The Debt Dragon is patient, getting bigger, and has a very long memory.",q:"Loan: 5,000gp at 18% annual (= 1.5%/month)\nYou pay only the minimum: 2% of balance each month\n\nMonth 1: What is your new balance after the minimum payment?\n(Show: interest added, then minimum paid, then new balance)",hint:"Monthly rate = 18% ÷ 12 = 1.5%\nInterest added = 5,000 × 0.015\nMin. payment = 5,000 × 0.02\nPaid toward principal = payment − interest",type:'number',ans:4975,tol:25,exp:"Month 1 interest: 5,000 × 0.015 = 75gp\nMin. payment: 5,000 × 0.02 = 100gp\nPaid toward principal: 100 − 75 = only 25gp!\nNew balance: 4,975gp\n\n75% of each payment goes to interest.\nAt this rate, full payoff takes over 30 years.\nThe Debt Dragon eats 75% of your payments and grows fat.",gr:200,lvl:6,msg:'+200gp Debt Dragon Slayer Badge! (The Dragon is injured. Not yet slain. Keep paying above minimum.)'},
  {id:13,tm:13,sub:'📜 ELA',code:'PA 17.4.9-12.H',qt:'The Portfolio Parchment',rt:'Investment Portfolio Recommendation',lore:"The Royal Investment Council accepted your membership application. To join fully, you must submit a written portfolio recommendation. The Council is impressed by specificity and unmoved by vague enthusiasm.",q:"Write an investment portfolio recommendation (5–7 sentences) for:\n  • A 28-year-old investor\n  • Moderate risk tolerance\n  • 30-year investment horizon\n  • 500gp/month to invest\n\nCover: investment types, why they fit this situation, and how diversification protects the portfolio.",type:'writing',mw:40,checks:['I recommended at least two different types of investments','I explained why the 30-year time horizon influences my choices','I addressed how moderate risk tolerance affects the balance','I explained why diversification protects the portfolio'],gr:175,lvl:6,msg:'+175gp Investment Council Welcome Bonus! Your portfolio has been framed and hung in the hall.'},
  {id:14,tm:14,sub:'🗺️ Social Studies',code:'PA 17.2.9-12.C',qt:'The Great Career Calculus',rt:'Education Cost vs. Lifetime Income',lore:"The Royal Employment Bureau commissioned a study. Two career paths. One mathematical answer and one important nuance. You are on the committee.",q:"Career Path A: 38,000gp/yr, zero education debt\nCareer Path B: 58,000gp/yr, 45,000gp student debt (paid at 500gp/month)\n\nDuring Path B's repayment period, what is Path B's net annual income?\n(Subtract annual debt payments from income)",hint:"Annual debt payment = 500gp × 12 months\nNet income = gross income − annual debt payment",type:'number',ans:52000,tol:500,exp:"Path B annual debt payment: 500 × 12 = 6,000gp\nPath B net income: 58,000 − 6,000 = 52,000gp\n\nPath B is still AHEAD of Path A by 14,000gp/year — even during repayment!\nNuance: this changes if Path B's income were only 42,000gp.\nThe income LEVEL matters as much as the debt AMOUNT.",gr:180,lvl:6,msg:'+180gp Employment Bureau Research Grant! The Bureau will publish your findings.'},
  {id:15,tm:15,sub:'🔢 Math',code:'PA 17.2.9-12.H',qt:'The Tax Tribunal',rt:'Progressive Tax Brackets',lore:"The Royal Tax Tribunal summoned you — not because you did anything wrong, but because calculating progressive tax brackets correctly is rarer than expected.",q:"Gross annual income: 54,000gp\n\nTax bracket rates:\n  10% on first 11,000gp\n  12% on income from 11,001–44,725gp\n  22% on income above 44,725gp\n\nCalculate the TOTAL tax owed across all three brackets.",hint:"Each bracket taxes only the income IN that range:\nBracket 1: 11,000 × 0.10\nBracket 2: (44,725 − 11,000) × 0.12\nBracket 3: (54,000 − 44,725) × 0.22\nAdd all three.",type:'number',ans:7188,tol:100,exp:"Bracket 1 (10%): 11,000 × 0.10 = 1,100gp\nBracket 2 (12%): 33,725 × 0.12 = 4,047gp\nBracket 3 (22%): 9,275 × 0.22 ≈ 2,041gp\n\nTotal: 7,188gp. Effective rate: 13.3%\n\nCommon error: applying 22% to all 54,000 (gives 11,880 — wrong!).\nThe 22% bracket ONLY applies to income above 44,725gp.",gr:220,lvl:6,msg:'+220gp Tribunal Certification! You may now explain tax brackets at family gatherings.'},
  {id:16,tm:16,sub:'🔢 Math',code:'PA 17.4.9-12.A',qt:'The Net Worth Reckoning',rt:'Assets, Liabilities & Net Worth',lore:"The Grand Chronicler requires a full accounting of everything you own versus everything you owe. This is the Reckoning. It is not as dramatic as the name suggests. It is just subtraction.",q:"ASSETS (what you own):\n  Home value: 180,000gp\n  Cart: 12,000gp\n  Vault Savings: 8,500gp\n  Investment Account: 22,000gp\n\nLIABILITIES (what you owe):\n  Mortgage: 145,000gp\n  Cart Loan: 7,200gp\n  Credit Card: 2,400gp\n\nCalculate your NET WORTH.",hint:"Net Worth = Total Assets − Total Liabilities\nAdd all assets. Add all liabilities. Subtract.",type:'number',ans:67900,tol:300,exp:"Total Assets: 180,000+12,000+8,500+22,000 = 222,500gp\nTotal Liabilities: 145,000+7,200+2,400 = 154,600gp\n\nNet Worth: 222,500 − 154,600 = 67,900gp\n\nHome equity (180,000 − 145,000 = 35,000gp) is the largest piece.\nIf home values drop 10%: net worth drops by 18,000gp.\nHousing risk is real and significant.",gr:250,lvl:6,msg:'+250gp Chronicler Grand Seal! Year 2 complete. You now understand what you actually own.'}
];
const LVL=['','Copper Adventurer (It\'s a Start)','Silver Coin Keeper (The Vault Has Opened)','Gold War Chest Guardian (Emergency Fund: Active)','Debt Slayer (The Dragon Had a Mortgage)','Guild Investor (Compound Interest Is Now Your Friend)','Master of Coin (Title Comes With No Extra Coins, Sadly)'];

// ─── STATE ─────────────────────────────────────────────────────────────────────
let S={screen:'welcome',hasSave:false,pl:null,phase:'budget',sav:0,ev:null,sum:null,pq:null,qd:null,qa:'',qc:'',qfb:null,att:0,wc:[],lvu:0,nn:'',np:'',y2:false};
const SAVE_KEY='lq_v4';

// ─── HELPERS ───────────────────────────────────────────────────────────────────
const fmt=n=>Math.abs(Math.round(n)).toLocaleString();
const gp=id=>PATHS.find(p=>p.id===id);
const cInc=(pid,mo,y2m)=>{if(gp(pid)?.variable){const b=BARD[mo%12];return y2m?Math.round(b*1.05):b;}return y2m?Math.round((gp(pid)?.income||0)*1.05):(gp(pid)?.income||0);};
const cMD=pid=>({scholar:320,healer:180,bard:60}[pid]||0);
const gExps=(pid,i,y2m)=>{const p=gp(pid),rent=900-(p?.disc||0)+(y2m?200:0);return[{n:'🏠 Lodgings',s:y2m?'Rent (Year 2 Increase!)':'Rent/Housing',a:rent},{n:'🍖 Provisions',s:'Food & Groceries',a:350+(y2m?50:0)},{n:'🐴 Steed Upkeep',s:'Transportation',a:200},{n:'🕯️ Utilities',s:'Candles & Fuel',a:110},{n:"👑 King's Tax",s:'Income Tax (22%)',a:Math.round(i*0.22)}];};
const cET=(pid,i,y2m)=>gExps(pid,i,y2m).reduce((s,e)=>s+e.a,0);
const cI=()=>S.pl?cInc(S.pl.pathId,S.pl.month,S.y2):0;
const cD=()=>{if(!S.pl)return 0;const i=cI();return i-cET(S.pl.pathId,i,S.y2)-cMD(S.pl.pathId);};
const allQ=()=>[...Q1,...Q2];
const getMQ=mo=>allQ().find(q=>q.tm===mo&&!S.pl?.questsDone.includes(q.id));
function svG(p){try{localStorage.setItem(SAVE_KEY,JSON.stringify({pl:p,y2:S.y2}));}catch(e){}}
function ldG(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}

// ─── RENDER ────────────────────────────────────────────────────────────────────
const APP=document.getElementById('app');
function R(){
  if(S.screen==='welcome')APP.innerHTML=wHTML();
  else if(S.screen==='create')APP.innerHTML=cHTML();
  else if(S.screen==='game'&&S.pl){
    if(S.phase==='budget')APP.innerHTML=bHTML();
    else if(S.phase==='rolling')APP.innerHTML=rolHTML();
    else if(S.phase==='event')APP.innerHTML=evHTML();
    else if(S.phase==='results')APP.innerHTML=resHTML();
    else if(S.phase==='quest')APP.innerHTML=qHTML();
  }else if(S.screen==='y1end')APP.innerHTML=y1HTML();
  else if(S.screen==='end')APP.innerHTML=endHTML();
  else APP.innerHTML=`<div class="card"><p style="text-align:center;padding:30px">Loading adventure...</p></div>`;
  APP.innerHTML+=`<footer>Life Quest · PA Standards 17.1–17.6 · <a href="https://github.com" target="_blank">GitHub</a> · <a href="teacher-guide.html" target="_blank">Teacher's Guide</a></footer>`;
}

// ─── HTML BUILDERS ─────────────────────────────────────────────────────────────
const SC=(l,v,c)=>`<div class="sc"><p class="sl">${l}</p><p class="sv" style="color:${c}">${v}</p></div>`;
const ER=(n,s,a,c)=>`<div class="er"><span>${n} <span style="font-size:11px;color:var(--muted)">(${s})</span></span><span style="color:${c}">−${fmt(a)}gp</span></div>`;

function wHTML(){return`<div class="card" style="text-align:center;padding:32px 22px">
<div style="font-size:50px;margin-bottom:8px" class="anim">🏰</div>
<h1 class="gt">LIFE QUEST</h1>
<span class="ey">A Personal Finance Adventure · PA Standards 17.1–17.6</span>
<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
  <span class="tag tg">11 Year 1 Quests</span><span class="tag tpu">5 Year 2 Hard Mode Quests</span><span class="tag tb">24 Random Events</span>
</div>
<p style="font-size:14px;line-height:1.7;margin-bottom:8px">Choose your life path, manage your budget over <strong>12 months</strong>, survive random events, and complete subject-area quests. Complete Year 1 to unlock <strong>Year 2 Hard Mode</strong>!</p>
<p style="font-size:12px;color:var(--muted);margin-bottom:18px">💾 Progress saves automatically to this browser. No login needed.</p>
<div style="display:flex;flex-direction:column;gap:10px;align-items:center">
  <button class="btn bg bw" style="max-width:300px" onclick="startNew()">⚔️ Begin New Adventure</button>
  ${S.hasSave?`<button class="btn bo bw" style="max-width:300px" onclick="loadSv()">📜 Continue Saved Adventure</button>`:''}
</div>
<p style="font-size:11px;color:var(--muted);margin-top:16px">Math · ELA · Social Studies · Science</p>
</div>`;}

function cHTML(){
const cards=PATHS.map(p=>`<div class="pc${S.np===p.id?' sel':''}" onclick="selP('${p.id}')">
<div class="rw" style="margin-bottom:2px">
  <div style="display:flex;align-items:center;gap:7px"><span style="font-size:20px">${p.sym}</span><div><p class="pt">${p.title}</p><p class="pf">${p.flavor}</p></div></div>
  <span class="tag ta">${p.sub}</span>
</div>
<p style="font-size:12px;color:#633806;margin:3px 0 5px">${p.blurb}</p>
<div>${p.variable?'<span class="tag ta">Variable income</span>':`<span class="tag tg">💰 ${fmt(p.income)}gp/mo</span>`}${p.debt>0?`<span class="tag tr">⚠️ ${fmt(p.debt)}gp debt</span>`:'<span class="tag tg">✅ No debt</span>'}<span class="tag tb">🪙 Starts ${fmt(p.gold)}gp</span></div>
</div>`).join('');
return`<div class="card">
<h2 class="st">⚔️ Choose Your Life Path</h2><span class="ey">Your path determines income, debt, and destiny</span>
<label style="font-size:12px;color:var(--muted);font-weight:bold;display:block;margin-bottom:4px">Adventurer Name:</label>
<input class="fi" value="${S.nn}" oninput="S.nn=this.value" placeholder="Enter your name..." maxlength="28" style="margin-bottom:12px">
<div class="sep"></div>
<p style="font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:8px">Select a Life Path:</p>
${cards}
<div class="sep"></div>
<div style="display:flex;gap:10px"><button class="btn bo" onclick="S.screen='welcome';R()">← Back</button><button class="btn bgn" style="flex:2" onclick="mkC()">Begin Adventure! ⚔️</button></div>
</div>`;}

function bHTML(){
const p=S.pl,path=gp(p.pathId),i=cI(),e=gExps(p.pathId,i,S.y2),et=cET(p.pathId,i,S.y2),md=cMD(p.pathId),d=cD(),ms=Math.max(0,d),nw=p.gold+p.savings-p.debt,vo=p.questsDone.includes(1),qDone=p.questsDone.length,aq=allQ();
return`<div class="card${S.y2?' y2':''}">
<div class="rw" style="margin-bottom:12px">
  <div>
    <p style="font-size:10px;color:${S.y2?'var(--purple)':'var(--muted)'};margin:0;letter-spacing:1px">${S.y2?'⚡ YEAR 2 HARD MODE · ':''}MONTH ${p.month+1}${S.y2?` (Y2 M${p.month-12+1}/12)`:' OF 12'} · ${qDone}/${aq.length} QUESTS</p>
    <p style="font-family:var(--serif);font-size:16px;color:var(--text);margin:2px 0">${path.sym} ${p.name}</p>
    <p style="font-size:11px;color:${S.y2?'var(--purple)':'var(--muted)'};margin:0">${path.title} · Lvl ${p.level}: ${LVL[p.level]}</p>
  </div>
  <div style="text-align:right">
    <p style="font-size:11px;color:var(--muted);margin:0">${nw<0?'Net Debt':'Net Worth'}</p>
    <p style="font-family:var(--serif);font-size:20px;margin:0;color:${nw>=0?'var(--green)':'var(--red)'}">${nw<0?'-':''}${fmt(Math.abs(nw))}gp</p>
  </div>
</div>
<div class="sg">${SC('🪙 Gold Purse',fmt(p.gold)+'gp',p.gold>=0?'var(--text)':'var(--red)')}${SC('🏦 Vault Savings',vo?fmt(p.savings)+'gp':'🔒 Locked',vo?'#185fa5':'#888')}${SC('💀 Debt',p.debt>0?fmt(p.debt)+'gp':'Debt Free!',p.debt>0?'var(--red)':'var(--green)')}</div>
<div class="sep"></div>
<div class="rw" style="margin-bottom:${path.variable?4:10}px"><span style="font-size:13px;font-weight:bold">⚔️ Monthly Income</span><strong style="color:var(--green);font-size:15px">+${fmt(i)}gp${S.y2?' (+5% raise!)':''}</strong></div>
${path.variable?`<p style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">Bard income this month: "${i<2500?'character building':'a legitimately good month'}".</p>`:''}
${S.y2?`<div class="box pu" style="font-size:12px;margin-bottom:10px;padding:8px 12px">⚡ <strong>Year 2:</strong> Rent +200gp · Provisions +50gp · Events more volatile. Your raise covers some of it. <em>Some.</em></div>`:''}
<div class="box" style="margin-bottom:10px">
  <p style="font-size:11px;color:var(--muted);font-weight:bold;margin:0 0 5px">Fixed Monthly Expenses:</p>
  ${e.map(x=>ER(x.n,x.s,x.a,'var(--red)')).join('')}
  ${md>0?`<div class="er"><span>📋 Min. Debt Payment</span><span style="color:var(--red)">−${fmt(md)}gp</span></div>`:''}
  <div class="er" style="font-weight:bold;font-size:14px;border-bottom:none;margin-top:4px"><span>Disposable Gold:</span><span style="color:${d>=0?'var(--green)':'var(--red)'}">${fmt(d)}gp</span></div>
</div>
${vo&&d>0?`<div style="margin-bottom:10px">
  <div class="rw" style="margin-bottom:4px"><label style="font-size:12px;color:var(--muted);font-weight:bold">🏦 Vault deposit this month:</label><strong id="sd">${fmt(S.sav)}gp</strong></div>
  <input type="range" min="0" max="${ms}" value="${S.sav}" step="10" oninput="updS(this.value)">
  <div class="rw" style="font-size:11px;color:var(--muted)"><span>0gp</span><span>${fmt(ms)}gp max</span></div>
</div>`:(!vo?`<div class="box nf" style="margin-bottom:10px;font-size:13px">🔒 Vault unlocks after Quest 1 — coming after this month!</div>`:'')}
<div class="rw" style="background:rgba(186,117,23,.1);border-radius:4px;padding:8px 12px;margin-bottom:${d<0?0:12}px">
  <span style="font-size:13px;font-weight:bold">Pocket money after saving:</span>
  <strong id="pd">${fmt(Math.max(0,d-S.sav))}gp</strong>
</div>
${d<0?`<div class="box bd" style="margin-bottom:12px">⚠️ Expenses exceed income this month. Savings will cover the gap — which is their entire purpose.</div>`:''}
<div class="rw">
  <p style="font-size:12px;color:var(--muted);font-style:italic;margin:0">Roll to see what this month has in store...</p>
  <button class="btn ${S.y2?'bpu':'br'}" style="font-size:14px;padding:10px 22px" onclick="doRoll()">🎲 Roll!</button>
</div>
<p class="save-note">💾 Auto-saved to this browser</p>
</div>`;}

function rolHTML(){return`<div class="card${S.y2?' y2':''}" style="text-align:center;padding:46px 22px">
<div style="font-size:72px;margin-bottom:12px" class="puls">🎲</div>
<h2 class="st">The dice tumble${S.y2?' (harder this year)':''}...</h2>
<p id="dd" style="font-family:var(--serif);font-size:56px;color:${S.y2?'var(--purple)':'var(--gold)'};margin:12px 0;text-align:center">?</p>
<p style="color:var(--muted);font-size:14px;font-style:italic">Fate and basic probability are collaborating...</p>
</div>`;}

function evHTML(){
if(!S.ev)return``;
const ev=S.ev,good=ev.typ==='good',bad=ev.typ==='bad';
let gD=ev.g;
if(ev.savings&&S.pl&&ev.pct){gD=Math.round(S.pl.savings*ev.pct*-1);}
return`<div class="card${S.y2?' y2':''}" style="text-align:center">
<p style="font-size:10px;color:${S.y2?'var(--purple)':'var(--muted)'};letter-spacing:2px;margin:0 0 8px">MONTH ${S.pl.month+1} · ${S.y2?'⚡ YEAR 2 · ':''}RANDOM EVENT</p>
<div style="font-size:64px;margin-bottom:10px" class="anim">${ev.e}</div>
<h2 class="st" style="color:${good?'var(--green)':bad?'var(--red)':'#633806'}">${ev.t}</h2>
<p style="font-size:15px;color:var(--text);line-height:1.6;margin-bottom:14px">${ev.d}</p>
<div class="box ${good?'gd':bad?'bd':'nf'}" style="font-family:var(--serif);font-size:30px;padding:14px;margin-bottom:10px">${gD>0?'+':''}${gD!==0?gD+'gp':'No change'}${ev.savings?' from savings':''}</div>
<div class="box nf" style="text-align:left;margin-bottom:14px;font-size:13px">💡 ${ev.tip}</div>
<button class="btn ${S.y2?'bpu':'bgn'}" style="padding:10px 30px;font-size:14px" onclick="procM()">Continue →</button>
</div>`;}

function resHTML(){
if(!S.sum)return``;
const ms=S.sum,p=S.pl,hq=S.pq;
return`<div class="card${S.y2?' y2':''}">
<h2 class="st">📋 Month ${p.month} Summary</h2><div class="sep"></div>
<div style="margin-bottom:12px">
  <div class="er" style="font-size:14px;color:var(--green)"><span>💰 Income</span><span>+${fmt(ms.income)}gp</span></div>
  <div class="er" style="font-size:14px;color:var(--red)"><span>📦 Expenses</span><span>−${fmt(ms.expenses)}gp</span></div>
  ${ms.md>0?`<div class="er" style="font-size:14px;color:var(--red)"><span>📋 Debt Payment</span><span>−${fmt(ms.md)}gp</span></div>`:''}
  ${ms.sav>0?`<div class="er" style="font-size:14px;color:#185fa5"><span>🏦 Vault Deposit</span><span>−${fmt(ms.sav)}gp</span></div>`:''}
  <div class="er" style="font-size:14px;color:${ms.evG>=0?'var(--green)':'var(--red)'}"><span>${ms.ev.e} ${ms.ev.t}</span><span>${ms.evG>0?'+':''}${ms.evG!==0?ms.evG+'gp':'0gp'}</span></div>
</div>
<div class="sg" style="margin-bottom:10px">${SC('🪙 Gold',fmt(ms.ng)+'gp',ms.ng>=0?'var(--text)':'var(--red)')}${SC('🏦 Vault',fmt(ms.ns)+'gp','#185fa5')}${SC('💀 Debt',ms.nd>0?fmt(ms.nd)+'gp':'Debt Free!',ms.nd>0?'var(--red)':'var(--green)')}</div>
<div class="box nf" style="text-align:center;margin-bottom:12px">
  <span style="font-family:var(--serif);font-size:14px">${ms.nw<0?'Net Debt':'Net Worth'}: </span>
  <span style="font-family:var(--serif);font-size:18px;color:${ms.nw>=0?'var(--green)':'var(--red)'}">${ms.nw<0?'-':''}${fmt(Math.abs(ms.nw))}gp</span>
</div>
${hq?`<div class="box ${S.y2?'pu':'nf'}" style="margin-bottom:10px;font-size:13px">
  <strong style="font-size:14px">${S.y2?'⚡':'⚔️'} Quest Unlocked: ${hq.qt}</strong><br>
  <span style="color:${S.y2?'var(--purple)':'var(--muted)'}">${hq.sub} · ${hq.code}</span><br>
  Complete this quest to advance to the next month!
</div>
<button class="btn ${S.y2?'bpu':'bg'} bw" onclick="bQ()">${S.y2?'⚡':'⚔️'} Begin Quest!</button>`
:`<button class="btn bgn bw" onclick="nxtM()">${p.month>=23?'🏆 View Final Results!':p.month===12&&S.y2?`Y2 Month ${p.month-12+2} →`:`Month ${p.month+2} →`}</button>`}
</div>`;}

function qHTML(){
if(!S.qd)return``;
const q=S.qd;let ui='';
if(!S.qfb){
  if(q.type==='number'){ui=`<label style="font-size:12px;color:var(--muted);font-weight:bold;display:block;margin-bottom:4px">Your answer (gold pieces):</label><input class="fi" type="number" value="${S.qa}" oninput="S.qa=this.value" placeholder="Enter number..." style="margin-bottom:12px">`;}
  else if(q.type==='nc'){ui=`<p style="font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:6px">Which option is cheaper?</p><div style="display:flex;gap:8px;margin-bottom:10px">${q.choices.map(c=>`<button class="btn ${S.qc===c.id?'bgn':'bo'}" style="flex:1;font-size:12px" onclick="S.qc='${c.id}';R()">${c.label}</button>`).join('')}</div><label style="font-size:12px;color:var(--muted);font-weight:bold;display:block;margin-bottom:4px">Difference in gold pieces:</label><input class="fi" type="number" value="${S.qa}" oninput="S.qa=this.value" placeholder="Enter gold pieces..." style="margin-bottom:12px">`;}
  else if(q.type==='writing'){
    const wc=S.qa.trim().split(/\s+/).filter(w=>w.length>0).length;
    ui=`<label style="font-size:12px;color:var(--muted);font-weight:bold;display:block;margin-bottom:4px">Your Response: <span id="wcd" style="color:${wc>=(q.mw||30)?'var(--green)':'var(--muted)'}">${wc} words (min: ${q.mw||30})</span></label>
<textarea class="fi" oninput="updW(this.value)" placeholder="Write your response here...">${S.qa}</textarea>
<div style="margin:10px 0 8px"><p style="font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:6px">✅ Confirm before submitting:</p>
${q.checks.map((ch,i)=>`<label style="display:flex;gap:8px;align-items:flex-start;font-size:12px;margin-bottom:5px;cursor:pointer;line-height:1.4"><input type="checkbox" id="wc${i}" ${S.wc[i]?'checked':''} onchange="togWC(${i})" style="margin-top:2px;flex-shrink:0"><span>${ch}</span></label>`).join('')}</div>
<p style="font-size:11px;color:var(--muted);font-style:italic;margin:0 0 10px">💡 Your teacher may review this response — write as if they will.</p>`;
  }
  ui+=`<button class="btn ${S.y2?'bpu':'bgn'} bw" onclick="subQ()">📜 Submit Answer</button>`;
}
return`<div class="card${S.y2?' y2':''}">
<div class="rw" style="margin-bottom:10px">
  <span class="tag ${S.y2?'tpu':'ta'}" style="font-size:12px">${q.sub}</span>
  <span class="tag tb">${q.code}</span>
  ${S.y2?'<span class="tag tpu" style="font-size:10px">⚡ YEAR 2</span>':''}
</div>
<h2 class="st">${q.qt}</h2>
<p style="font-size:12px;color:var(--muted);text-align:center;margin:0 0 10px">${q.rt}</p>
<div class="box" style="font-style:italic;font-size:13px;line-height:1.6;margin-bottom:10px">${q.lore}</div>
<div class="sep"></div>
<p style="font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:5px">📋 The Challenge:</p>
<div class="box" style="font-size:13px;line-height:1.8;white-space:pre-line;margin-bottom:10px">${q.q}</div>
${q.hint&&!S.qfb&&q.type!=='writing'?`<details style="margin-bottom:10px"><summary style="font-size:12px;color:var(--muted);font-weight:bold;cursor:pointer">🔮 Show Hint</summary><p style="font-size:12px;color:#633806;font-style:italic;margin-top:5px;white-space:pre-line">${q.hint}</p></details>`:''}
${!S.qfb?ui:`<div>
<div class="box ${S.qfb.ok?'gd':'bd'}" style="white-space:pre-line;font-size:13px;margin-bottom:10px">${S.qfb.msg}</div>
${S.qfb.ok?`<div class="box ${S.y2?'pu':'nf'}" style="text-align:center;margin-bottom:10px">
  <p style="font-family:var(--serif);font-size:14px;margin:0">${S.y2?'⚡':'🏆'} ${q.msg}</p>
  ${q.gr>0?`<p style="color:var(--muted);font-size:13px;margin:4px 0 0">+${q.gr}gp added to your purse!</p>`:''}
  ${S.lvu>0?`<p style="font-size:12px;color:var(--green);margin:5px 0 0">⭐ Level Up! → ${LVL[S.lvu]}</p>`:''}
</div>
<button class="btn bgn bw" onclick="afterQ()">Continue Adventure →</button>`:
`<button class="btn bg bw" onclick="S.qfb=null;S.qa='';S.qc='';R()">🔄 Try Again</button>`}
</div>`}
</div>`;}

function y1HTML(){
const p=S.pl,path=gp(p.pathId),nw=p.gold+p.savings-p.debt;
return`<div class="card" style="text-align:center;padding:28px 22px">
<div style="font-size:56px;margin-bottom:8px" class="anim">🎉</div>
<h1 class="gt">Year 1 Complete!</h1>
<p style="font-family:var(--serif);color:#633806;margin:4px 0">${p.name} · ${path.title}</p>
<span class="ey">Level ${p.level}: ${LVL[p.level]}</span>
<div class="box nf" style="padding:16px;margin-bottom:14px">
  <p style="font-size:12px;color:var(--muted);margin:0 0 4px">Year 1 Net Worth</p>
  <p style="font-family:var(--serif);font-size:34px;margin:0;color:${nw>=0?'var(--green)':'var(--red)'}">${nw<0?'-':''}${fmt(Math.abs(nw))}gp</p>
</div>
<div class="sg" style="margin-bottom:14px">${SC('🪙 Purse',fmt(p.gold)+'gp','var(--text)')}${SC('🏦 Vault',fmt(p.savings)+'gp','#185fa5')}${SC('💀 Debt',p.debt>0?fmt(p.debt)+'gp':'None!',p.debt>0?'var(--red)':'var(--green)')}</div>
<div class="box pu" style="padding:14px;margin-bottom:14px;text-align:left">
  <p style="font-weight:bold;font-size:13px;color:#3b0d6a;margin:0 0 8px">⚡ Year 2 Hard Mode — What Changes:</p>
  <p style="font-size:13px;color:#3b0d6a;margin:2px 0">• Income: +5% raise (your hard work is noted)</p>
  <p style="font-size:13px;color:#3b0d6a;margin:2px 0">• Rent: +200gp/month (your landlord's observation: he can charge more)</p>
  <p style="font-size:13px;color:#3b0d6a;margin:2px 0">• Provisions: +50gp/month (inflation, persistent as always)</p>
  <p style="font-size:13px;color:#3b0d6a;margin:2px 0">• Events: market crashes, identity theft, promotions</p>

</div>
<div style="display:flex;gap:10px">
  <button class="btn bo" style="flex:1" onclick="S.screen='end';R()">View Final Stats</button>
  <button class="btn bpu" style="flex:2;font-size:14px" onclick="startY2()">⚡ Enter Year 2 Hard Mode!</button>
</div>
</div>`;}

function endHTML(){
const p=S.pl,path=gp(p.pathId),nw=p.gold+p.savings-p.debt,aq=allQ(),qd=p.questsDone.length;
const verdict=S.y2?(nw>15000&&p.debt===0?'Year 2 complete and the numbers are beautiful.':nw>0?'Year 2 complete. The realm respects the effort even when the margin is slim.':'Year 2 humbled you. This is statistically valuable information for Year 3.'):(nw>5000&&p.debt===0?'The realm speaks of your financial acumen in hushed, admiring tones.':nw>0?'A solid first year. The dragon of debt is diminished.':'Personal finance is humbling. Year Two is an option! Try it.');
return`<div class="card${S.y2?' y2':''}" style="text-align:center">
<div style="font-size:56px;margin-bottom:8px" class="anim">${S.y2?'👑':'🏆'}</div>
<h1 class="gt">${S.y2?'Year 2 Complete!':'Adventure Complete!'}</h1>
<p style="font-family:var(--serif);font-size:14px;color:#633806;margin:4px 0">${p.name} · ${path.title}</p>
<span class="ey">Level ${p.level}: ${LVL[p.level]}</span>
<div class="box ${S.y2?'pu':'nf'}" style="padding:16px;margin-bottom:12px">
  <p style="font-size:11px;color:var(--muted);margin:0 0 4px">Final Net Worth</p>
  <p style="font-family:var(--serif);font-size:36px;margin:0;color:${nw>=0?'var(--green)':'var(--red)'}">${nw<0?'-':''}${fmt(Math.abs(nw))}gp</p>
  <p style="font-size:12px;color:var(--muted);margin:8px 0 0;font-style:italic">${verdict}</p>
</div>
<div class="sg" style="margin-bottom:12px">${SC('🪙 Gold',fmt(p.gold)+'gp','var(--text)')}${SC('🏦 Vault',fmt(p.savings)+'gp','#185fa5')}${SC('💀 Debt',p.debt>0?fmt(p.debt)+'gp':'Debt Free!',p.debt>0?'var(--red)':'var(--green)')}</div>
<div style="text-align:left;margin-bottom:12px">
  <p style="font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:6px">Quests Completed: ${qd}/${aq.length}</p>
  ${aq.map(q=>`<div style="display:flex;gap:7px;margin-bottom:3px;font-size:12px;align-items:center"><span>${p.questsDone.includes(q.id)?'✅':'❌'}</span><span style="flex:1;color:var(--text)">${q.qt}</span><span class="tag ${q.id>11?'tpu':'tb'}" style="font-size:10px">${q.sub.slice(q.sub.indexOf(' ')+1)}</span></div>`).join('')}
</div>
<div class="box nf" style="text-align:left;margin-bottom:12px;font-size:12px">
  <strong>PA Standards Covered:</strong> 17.1 · 17.2 · 17.3 · 17.4 · 17.5 · 17.6 ${S.y2?'(All 6 strands, both years)':''}
</div>
<button class="btn bgn bw" onclick="resetG()">🔄 Play Again (New Character)</button>
</div>`;}

// ─── ACTIONS ────────────────────────────────────────────────────────────────────
function updS(v){S.sav=parseInt(v)||0;const sd=document.getElementById('sd'),pd=document.getElementById('pd');if(sd)sd.textContent=fmt(S.sav)+'gp';if(pd)pd.textContent=fmt(Math.max(0,cD()-S.sav))+'gp';}
function updW(v){S.qa=v;const el=document.getElementById('wcd');if(el){const wc=v.trim().split(/\s+/).filter(w=>w.length>0).length;el.textContent=`${wc} words (min: ${S.qd?.mw||30})`;el.style.color=wc>=(S.qd?.mw||30)?'var(--green)':'var(--muted)';}}
function togWC(i){S.wc[i]=!S.wc[i];const cb=document.getElementById('wc'+i);if(cb)cb.checked=S.wc[i];}
function startNew(){S.nn='';S.np='';S.y2=false;S.screen='create';R();}
function selP(id){S.np=id;R();}
function mkC(){const n=S.nn.trim();if(!n||!S.np)return;const path=gp(S.np);S.pl={name:n,pathId:S.np,level:1,gold:path.gold,savings:0,debt:path.debt,month:0,questsDone:[],log:[]};S.sav=0;S.pq=null;S.ev=null;S.sum=null;S.y2=false;S.screen='game';S.phase='budget';R();svG(S.pl);}
function loadSv(){const d=ldG();if(d){S.pl=d.pl;S.y2=d.y2||false;S.screen='game';S.phase='budget';S.sav=0;S.pq=null;S.ev=null;S.sum=null;R();}}
function doRoll(){S.phase='rolling';R();let ct=0;function tk(){const dd=document.getElementById('dd');if(dd)dd.textContent=Math.floor(Math.random()*20)+1;ct++;if(ct<15){setTimeout(tk,75);}else{const pool=S.y2?EV2:EV1;S.ev=pool[Math.floor(Math.random()*pool.length)];setTimeout(()=>{S.phase='event';R();},300);}}setTimeout(tk,80);}
function procM(){if(!S.pl||!S.ev)return;const p=S.pl,i=cI(),et=cET(p.pathId,i,S.y2),md=cMD(p.pathId),d=i-et-md;const sav=Math.max(0,Math.min(S.sav,Math.max(0,d)));let evG=S.ev.g;let ng=p.gold+(d-sav+evG),ns=p.savings+sav,nd=Math.max(0,p.debt-md);if(S.ev.savings&&S.ev.pct){const loss=Math.round(ns*S.ev.pct);evG=-loss;ns=Math.max(0,ns-loss);}if(ng<0&&ns>0){const pull=Math.min(-ng,ns);ns-=pull;ng+=pull;}const quest=getMQ(p.month);const np={...p,gold:ng,savings:ns,debt:nd,month:p.month+1,log:[...p.log,{m:p.month+1,e:S.ev.t,g:evG}]};S.sum={income:i,expenses:et,md,sav,ev:S.ev,evG,ng,ns,nd,nw:ng+ns-nd};S.pq=quest||null;S.pl=np;S.phase='results';R();svG(S.pl);}
function bQ(){S.qd=S.pq;S.pq=null;S.qa='';S.qc='';S.qfb=null;S.att=0;S.lvu=0;S.wc=S.qd?.checks?new Array(S.qd.checks.length).fill(false):[];S.phase='quest';R();}
function subQ(){if(!S.qd)return;const q=S.qd;S.att++;if(q.type==='number'){const v=parseInt((S.qa+'').replace(/,/g,''));if(isNaN(v))return;const ok=Math.abs(v-q.ans)<=q.tol;S.qfb={ok,msg:ok?`✅ Correct!\n\n${q.exp}`:`❌ Not quite. ${S.att>=3?`Answer: ${fmt(q.ans)}gp.\n\n`:''}${q.exp}`};if(ok)cmpQ(q);R();}else if(q.type==='nc'){const v=parseInt((S.qa+'').replace(/,/g,''));if(isNaN(v)||!S.qc)return;const ok=Math.abs(v-q.ans)<=q.tol&&S.qc===q.cc;S.qfb={ok,msg:ok?`✅ Correct!\n\n${q.exp}`:`❌ Not quite. ${S.att>=3?`Hint: ${q.cc} saves ${fmt(q.ans)}gp.\n\n`:''}${q.exp}`};if(ok)cmpQ(q);R();}else if(q.type==='writing'){const wc=S.qa.trim().split(/\s+/).filter(w=>w.length>0).length;if(wc<(q.mw||30)){S.qfb={ok:false,msg:`The Herald requires at least ${q.mw||30} words. You have ${wc}. The gap is ${(q.mw||30)-wc} words wide.`};R();return;}if(!S.wc.every(Boolean)){S.qfb={ok:false,msg:"Please confirm all checklist items. Each unchecked box has been noted individually by the Herald."};R();return;}cmpQ(q);S.qfb={ok:true,msg:`📜 Scroll Stamped for Teacher Review!\n\nAll ${q.checks.length} required points confirmed.`};R();}}
function cmpQ(q){const ol=S.pl.level,nl=Math.max(ol,q.lvl);S.lvu=nl>ol?nl:0;S.pl={...S.pl,level:nl,gold:S.pl.gold+q.gr,questsDone:[...S.pl.questsDone,q.id]};svG(S.pl);}
function afterQ(){S.qd=null;S.qfb=null;S.phase='results';R();}
function nxtM(){S.sav=0;S.ev=null;S.sum=null;S.pq=null;if(S.pl.month>=24){S.screen='end';}else if(S.pl.month===12&&!S.y2){S.screen='y1end';}else{S.phase='budget';}R();}
function startY2(){S.y2=true;S.screen='game';S.phase='budget';R();svG(S.pl);}
function resetG(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}S={...S,screen:'welcome',hasSave:false,pl:null,phase:'budget',sav:0,ev:null,sum:null,pq:null,qd:null,qa:'',qc:'',qfb:null,att:0,wc:[],lvu:0,nn:'',np:'',y2:false};R();}

// ─── INIT ───────────────────────────────────────────────────────────────────────
const saved=ldG();S.hasSave=!!saved;R();
</script>
